name: Deploy AWS Infrastructure

on:
  workflow_dispatch:
    inputs:
      keypair:
        description: "EC2 Key Pair Name"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy VPC Stack
        run: |
          aws cloudformation deploy \
          --stack-name vpc-stack \
          --template-file vpc-stack.yml \
          --region us-east-1

      - name: Verify EC2 Key Pair
        run: |
          aws ec2 describe-key-pairs \
          --key-names "${{ github.event.inputs.keypair }}" \
          --region us-east-1

      - name: Reset ALB Stack If Rollback Complete
        run: |
          status=$(aws cloudformation describe-stacks \
            --stack-name alb-stack \
            --region us-east-1 \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || true)

          if [ "$status" = "ROLLBACK_COMPLETE" ]; then
            echo "alb-stack is ROLLBACK_COMPLETE. Deleting before redeploy..."
            aws cloudformation delete-stack --stack-name alb-stack --region us-east-1
            aws cloudformation wait stack-delete-complete --stack-name alb-stack --region us-east-1
          fi

      - name: Deploy ALB Stack
        run: |
          aws cloudformation deploy \
          --stack-name alb-stack \
          --template-file alb-stack.yml \
          --parameter-overrides KeyName=${{ github.event.inputs.keypair }} \
          --region us-east-1
